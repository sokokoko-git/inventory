<!doctype html>

<!-- NOMIKURABE 認証専用ページ（GitHub Pages にホスト） -->
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NOMIKURABE 認証</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0d0d0d; color: #ccc;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 24px; text-align: center;
  }
  .logo { font-size: 22px; letter-spacing: 0.15em; color: #fff; }
  .sub  { font-size: 12px; color: #888; letter-spacing: 0.06em; }
  button {
    font-family: inherit; font-size: 13px; letter-spacing: 0.1em;
    color: #0d0d0d; background: #e8e8e8; border: none;
    padding: 14px 28px; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg { font-size: 12px; color: #999; min-height: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">NOMIKURABE</div>
  <div class="sub">ログインして続行</div>
  <button id="btn">Google でログイン</button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            'AIzaSyCbJqu_dR8fKErNcjOfZKKKqCesl3iZ2ZE',
  authDomain:        'nomikurabe-6f67e.firebaseapp.com',
  projectId:         'nomikurabe-6f67e',
  storageBucket:     'nomikurabe-6f67e.firebasestorage.app',
  messagingSenderId: '457501008268',
  appId:             '1:457501008268:web:4ca9d6d2fef5a34a94f6a9',
});

var auth = firebase.auth();
var btn  = document.getElementById('btn');
var msg  = document.getElementById('msg');

// トークンを開き元（アプリの iframe）へ送り返す
function sendTokens(user) {
  return user.getIdToken().then(function (idToken) {
    var payload = {
      type:         'nomikurabe-auth',
      idToken:      idToken,
      refreshToken: user.refreshToken,
      email:        user.email || '',
    };
    if (window.opener) {
      window.opener.postMessage(payload, '*');
      msg.textContent = 'ログイン成功。閉じています…';
      setTimeout(function () { window.close(); }, 600);
    } else {
      msg.textContent = 'このページはアプリから開いてください。';
    }
  });
}

btn.addEventListener('click', function () {
  btn.disabled = true;
  msg.textContent = '認証中…';
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(function (cred) { return sendTokens(cred.user); })
    .catch(function (e) {
      btn.disabled = false;
      msg.textContent = '失敗: ' + (e.message || e.code);
    });
});
</script>
</body>
</html>
