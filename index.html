<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NOMIKURABE | のみくらべ</title>
<meta name="description" content="お酒のテイスティング記録を共有・比較できるアプリ。日本酒・ワイン・ウイスキーなど8ジャンルのレーダーチャートで飲み比べを楽しもう。" />
<meta property="og:title" content="NOMIKURABE | のみくらべ" />
<meta property="og:description" content="お酒のテイスティング記録を共有・比較できるアプリ。日本酒・ワイン・ウイスキーなど8ジャンルのレーダーチャートで飲み比べを楽しもう。" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<style>
@font-face {
  font-family: 'BestTen-CRT';
  src: url('https://sokokoko-git.github.io/inventory/BestTen-CRT.otf') format('opentype');
  font-display: swap;
}
:root {
  --bg:      #0d0d0d;
  --surface: #141414;
  --surface2:#1a1a1a;
  --border:  #242424;
  --border2: #323232;
  --text1:   #e8e8e8;
  --text2:   #b8b8b8;
  --text3:   #787878;
  --text4:   #484848;
  --f: 'BestTen-CRT', monospace;
  --c-sake:   #8b9fd4;
  --c-wine:   #c96b7a;
  --c-whisky: #c49a4a;
  --c-beer:   #c4a84a;
  --c-shochu: #7ab87a;
  --c-soft:   #6ab8c8;
  --c-other:  #a08060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text1);font-family:var(--f);font-size:13px;line-height:1.5;-webkit-font-smoothing:none}
a{color:inherit;text-decoration:none}

/* ── Hero ─────────────────────────────────── */
.hero{text-align:center;padding:72px 24px 56px;border-bottom:1px solid var(--border)}
.hero-logo{font-size:34px;letter-spacing:.1em;margin-bottom:6px}
.hero-yomi{font-size:11px;color:var(--text4);letter-spacing:.2em;margin-bottom:28px}
.hero-desc{font-size:13px;color:var(--text2);line-height:2;max-width:360px;margin:0 auto 40px}
.hero-btn{
  display:inline-block;padding:12px 36px;
  border:1px solid var(--border2);color:var(--text2);
  font-family:var(--f);font-size:12px;letter-spacing:.12em;
  transition:border-color .15s,color .15s;
}
.hero-btn:hover{border-color:var(--text2);color:var(--text1)}

/* ── Features ────────────────────────────── */
.features{padding:48px 28px;max-width:520px;margin:0 auto}
.sec-title{font-size:10px;color:var(--text4);letter-spacing:.16em;margin-bottom:24px}
.feat{display:flex;align-items:baseline;gap:16px;margin-bottom:20px}
.feat-key{font-size:10px;color:var(--text4);letter-spacing:.12em;width:72px;flex-shrink:0}
.feat-val{font-size:12px;color:var(--text2);line-height:1.7}

/* ── Reviews ─────────────────────────────── */
.reviews{padding:0 16px 56px;max-width:960px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* ── Card ────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 14px 12px;position:relative;
  cursor:pointer;transition:border-color .15s;
}
.card:hover{border-color:var(--border2)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.gtag{font-size:9px;letter-spacing:.1em;padding:2px 6px;border:1px solid currentColor;opacity:.75}
.rating{font-size:20px;line-height:1}
.cname{font-size:15px;color:var(--text1);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.origin{font-size:10px;color:var(--text3);letter-spacing:.03em;margin-bottom:10px}
.radar-wrap{margin-bottom:10px}
.cbody{font-size:11px;color:var(--text3);line-height:1.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);margin-top:10px}
.card-hint{font-size:9px;color:var(--text4);letter-spacing:.06em}

/* genre colors */
.g-sake   .gtag,.g-sake   .rating{color:var(--c-sake)}
.g-wine   .gtag,.g-wine   .rating{color:var(--c-wine)}
.g-whisky .gtag,.g-whisky .rating{color:var(--c-whisky)}
.g-beer   .gtag,.g-beer   .rating{color:var(--c-beer)}
.g-shochu .gtag,.g-shochu .rating{color:var(--c-shochu)}
.g-soft   .gtag,.g-soft   .rating{color:var(--c-soft)}
.g-other  .gtag,.g-other  .rating{color:var(--c-other)}

/* ── Modal overlay ───────────────────────── */
#modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);z-index:1000;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#modal-inner{
  max-width:680px;margin:32px auto;padding:0 16px 60px;
}
.modal-back{
  background:none;border:none;cursor:pointer;
  font-family:var(--f);font-size:11px;color:var(--text3);
  letter-spacing:.1em;padding:20px 0;display:block;
}
.modal-back:hover{color:var(--text2)}

/* detail header */
.d-genre{font-size:10px;letter-spacing:.12em;margin-bottom:10px;opacity:.8}
.d-name{font-size:24px;letter-spacing:.04em;line-height:1.2;margin-bottom:6px}
.d-sub{font-size:11px;color:var(--text3);letter-spacing:.04em;margin-bottom:20px}
.d-score{font-size:40px;line-height:1;margin-bottom:4px}
.d-score-label{font-size:10px;color:var(--text3);letter-spacing:.1em}

/* detail body layout */
.d-body{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:24px;align-items:start;
  margin:24px 0;
}
@media(max-width:520px){
  .d-body{grid-template-columns:1fr}
}

/* axis bars */
.axes{display:flex;flex-direction:column;gap:8px}
.axis-row{display:flex;align-items:center;gap:8px}
.axis-label{font-size:9px;color:var(--text3);width:52px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.axis-track{flex:1;height:2px;background:var(--border2);position:relative}
.axis-fill{height:100%;position:absolute;left:0;top:0}
.axis-val{font-size:9px;color:var(--text3);width:20px;text-align:right;flex-shrink:0}

/* sections */
.d-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.d-section-title{font-size:9px;color:var(--text4);letter-spacing:.14em;margin-bottom:10px}
.d-section-body{font-size:12px;color:var(--text2);line-height:1.9}
.d-ai-badge{display:inline-block;font-size:8px;color:#e05555;border:1px solid #e05555;padding:1px 5px;letter-spacing:.06em;margin-right:8px;vertical-align:middle}
.d-meta-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:16px}
.d-meta-item{display:flex;flex-direction:column;gap:3px}
.d-meta-label{font-size:9px;color:var(--text4);letter-spacing:.1em}
.d-meta-val{font-size:12px;color:var(--text2)}

/* ── CTA bottom ──────────────────────────── */
.cta{text-align:center;padding:56px 24px 80px;border-top:1px solid var(--border)}
.cta p{font-size:11px;color:var(--text3);letter-spacing:.06em;line-height:2.2;margin-bottom:28px}

/* ── Footer ──────────────────────────────── */
.footer{text-align:center;padding:20px 24px 40px;border-top:1px solid var(--border)}
.footer span{font-size:10px;color:var(--text4);letter-spacing:.08em}

@media(max-width:480px){
  .hero-logo{font-size:26px}
  .hero{padding:56px 20px 44px}
  .grid{grid-template-columns:1fr}
  .d-name{font-size:18px}
  .d-score{font-size:32px}
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-logo">NOMIKURABE</div>
  <div class="hero-yomi">のみくらべ</div>
  <p class="hero-desc">
    お酒のテイスティング記録を<br>共有・比較できるアプリ。<br>
    日本酒・ワイン・ウイスキーなど<br>8ジャンルのレーダーチャートで<br>飲み比べを楽しもう。
  </p>
  <a href="https://script.google.com/macros/s/AKfycbxLaP0xK-BpHaU4FJ79jc_KJJQhfagjWTmM9EK9JHcblioUePZeniYew9yMwAmog4aaTQ/exec" class="hero-btn">
    アプリを開く →
  </a>
</div>

<!-- Features -->
<div class="features">
  <div class="sec-title">FEATURES</div>
  <div class="feat"><span class="feat-key">RECORD</span><span class="feat-val">8ジャンル・8軸テイスティングで記録</span></div>
  <div class="feat"><span class="feat-key">COMPARE</span><span class="feat-val">最大5本のレーダーチャートで飲み比べ</span></div>
  <div class="feat"><span class="feat-key">SHARE</span><span class="feat-val">仲間とレビューを共有・発見</span></div>
  <div class="feat"><span class="feat-key">NEXT</span><span class="feat-val">これから飲みたいリストを管理</span></div>
  <div class="feat"><span class="feat-key">AI</span><span class="feat-val">Gemini AI が産地・価格・解説を自動補完</span></div>
</div>

<!-- Sample Reviews -->
<div class="reviews">
  <div class="sec-title">SAMPLE REVIEWS — タップして詳細を見る</div>
  <div class="grid" id="grid"></div>
</div>

<!-- CTA -->
<div class="cta">
  <p>Googleアカウントがあればすぐに始められます</p>
  <a href="https://script.google.com/macros/s/AKfycbxLaP0xK-BpHaU4FJ79jc_KJJQhfagjWTmM9EK9JHcblioUePZeniYew9yMwAmog4aaTQ/exec" class="hero-btn">
    アプリを開く →
  </a>
</div>

<!-- Footer -->
<div class="footer">
  <span>© NOMIKURABE</span>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modal-inner">
    <button class="modal-back" id="modal-back">← BACK</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const APP_URL = 'https://script.google.com/macros/s/AKfycbxLaP0xK-BpHaU4FJ79jc_KJJQhfagjWTmM9EK9JHcblioUePZeniYew9yMwAmog4aaTQ/exec';

const SAMPLES = [
  {
    genre: 'sake', label: 'SAKE',
    name: '獺祭 純米大吟醸 二割三分',
    origin: '山口県',
    maker: '旭酒造',
    price: '¥5,500',
    rating: 9.2,
    axes: ['香り','甘味','酸味','苦味','コク','余韻','米の旨味','キレ'],
    vals: [8,8,4,2,9,8,9,7],
    body: '透明感のある甘みと米の旨味が絶妙。洗練された上品な一本。余韻も長い。',
    pairing: '刺身・白身魚・豆腐料理',
    aiComment: '旭酒造が手掛ける純米大吟醸の最高峰。精米歩合23%という極限まで磨いた米から生まれる洗練された味わいは、国内外で高い評価を受けている。冷やしてグラスに注ぐとより香りが際立つ。',
    user: 'きよら', date: '2026-05-18',
  },
  {
    genre: 'whisky', label: 'WHISKY',
    name: '山崎 12年',
    origin: '大阪府',
    maker: 'サントリー',
    price: '¥9,800',
    rating: 8.8,
    axes: ['香り','甘味','酸味','苦味','コク','余韻','スモーキー','樽感'],
    vals: [9,6,3,5,8,9,4,8],
    body: 'バニラとナッツの豊かな香り。ウッディな樽感と長い余韻が特徴的な国産ウイスキー。',
    pairing: 'チョコレート・ナッツ・スモークチーズ',
    aiComment: 'サントリー山崎蒸溜所が生産する国産シングルモルトウイスキー。ミズナラ樽をはじめとする多様な樽で熟成された複雑な味わいが特徴。2003年にISCで金賞を受賞し、日本のウイスキーを世界に知らしめた一本。',
    user: 'たろう', date: '2026-05-22',
  },
  {
    genre: 'wine', label: 'WINE',
    name: 'シャトー・モン・ペラ ブラン',
    origin: 'フランス',
    maker: 'ボルドー AOC',
    price: '¥2,200',
    rating: 7.9,
    axes: ['香り','甘味','酸味','苦味','コク','余韻','果実味','樽感'],
    vals: [7,5,8,4,6,7,8,3],
    body: '柑橘系の爽やかな果実味と心地よい酸味。食事との相性が抜群の白ワイン。',
    pairing: 'シーフード・サラダ・チキンのグリル',
    aiComment: 'ボルドーを代表するコスパの高い白ワイン。ソーヴィニヨン・ブランとセミヨンのブレンドで、フレッシュな柑橘系の香りと程よいコクを楽しめる。食前酒としても食中酒としても活躍する汎用性の高い一本。',
    user: 'みか', date: '2026-06-01',
  },
];

const GENRE_COLOR = {
  sake:'#8b9fd4', wine:'#c96b7a', whisky:'#c49a4a',
  beer:'#c4a84a', shochu:'#7ab87a', soft:'#6ab8c8', other:'#a08060',
};

function radar(vals, color, size) {
  const s = size || 120;
  const cx=s/2, cy=s/2, r=s*0.38, n=vals.length;
  const ang = i => (i/n)*2*Math.PI - Math.PI/2;
  const pt  = (i,sc) => [cx+sc*Math.cos(ang(i)), cy+sc*Math.sin(ang(i))];
  const poly = pts => pts.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ');
  const grids = [0.25,0.5,0.75,1].map(sc =>
    `<polygon points="${poly(Array.from({length:n},(_,i)=>pt(i,r*sc)))}" fill="none" stroke="#252525" stroke-width="0.8"/>`
  ).join('');
  const spokes = Array.from({length:n},(_,i)=>{
    const [x,y]=pt(i,r);
    return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#2e2e2e" stroke-width="0.8"/>`;
  }).join('');
  const dataPts = vals.map((v,i)=>pt(i,(v/10)*r));
  const path = dataPts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join('')+' Z';
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">${grids}${spokes}<path d="${path}" fill="${color}28" stroke="${color}" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
}

function axisBars(axes, vals, color) {
  return axes.map((name, i) => {
    const pct = (vals[i] / 10 * 100).toFixed(0);
    return `<div class="axis-row">
      <span class="axis-label">${name}</span>
      <div class="axis-track"><div class="axis-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="axis-val">${vals[i]}</span>
    </div>`;
  }).join('');
}

// カード描画
const grid = document.getElementById('grid');
SAMPLES.forEach((r, idx) => {
  const color = GENRE_COLOR[r.genre] || '#888';
  const el = document.createElement('div');
  el.className = `card g-${r.genre}`;
  el.innerHTML =
    `<div class="card-top">
      <span class="gtag">${r.label}</span>
      <span class="rating">${r.rating.toFixed(1)}</span>
    </div>
    <div class="cname">${r.name}</div>
    <div class="origin">${r.origin} · ${r.maker}</div>
    <div class="radar-wrap">${radar(r.vals, color, 120)}</div>
    <div class="cbody">${r.body}</div>
    <div class="cfoot">
      <span>${r.user}</span>
      <span class="card-hint">詳細を見る →</span>
    </div>`;
  el.addEventListener('click', () => openDetail(idx));
  grid.appendChild(el);
});

// モーダル詳細
function openDetail(idx) {
  const r = SAMPLES[idx];
  const color = GENRE_COLOR[r.genre] || '#888';
  document.getElementById('modal-content').innerHTML = `
    <div class="d-genre g-${r.genre}" style="color:${color}">${r.label}</div>
    <div class="d-name">${r.name}</div>
    <div class="d-sub">${r.origin} · ${r.maker}</div>
    <div class="d-score" style="color:${color}">${r.rating.toFixed(1)}</div>
    <div class="d-score-label">RATING / 10</div>

    <div class="d-body">
      <div>${radar(r.vals, color, 180)}</div>
      <div class="axes">${axisBars(r.axes, r.vals, color)}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">TASTING NOTES</div>
      <div class="d-section-body">${r.body}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">PAIRING</div>
      <div class="d-section-body">${r.pairing}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title"><span class="d-ai-badge">AI</span>AI 解説</div>
      <div class="d-section-body">${r.aiComment}</div>
    </div>

    <div class="d-section">
      <div class="d-meta-row">
        <div class="d-meta-item"><span class="d-meta-label">DATE</span><span class="d-meta-val">${r.date}</span></div>
        <div class="d-meta-item"><span class="d-meta-label">PRICE</span><span class="d-meta-val">${r.price}</span></div>
        <div class="d-meta-item"><span class="d-meta-label">BY</span><span class="d-meta-val">${r.user}</span></div>
      </div>
    </div>

    <div style="text-align:center;margin-top:40px">
      <a href="${APP_URL}" class="hero-btn">アプリで記録する →</a>
    </div>
  `;
  const modal = document.getElementById('modal');
  modal.style.display = 'block';
  modal.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('modal-back').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
